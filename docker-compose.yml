services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["${DB_PORT:-5434}:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports: ["${REDIS_PORT:-6380}:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  backend:
    user: "${UID}:${GID}"
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      RAILS_ENV: development
    ports: ["${BACKEND_PORT:-3000}:3000"]
    volumes:
      - ./backend:/app
    depends_on: [db]

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -lc "npm i && npm i pinia vue-router@4 axios && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend


volumes:
  pgdata: {}
  redisdata: {}
